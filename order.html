<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Branding & Signage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: lightblue;
      margin: 0;
      padding: 0;
    }
    .container {
      width: 80%;
      max-width: 780px;
      margin: 40px auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: blue;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, select, textarea {
      width: 80%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 20px;
      padding: 12px;
      background: #0073e6;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #005bb5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Place Your Order</h1>
    <form id="orderForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required>

      <label for="company">Company Name</label>
      <input type="text" id="company" name="company">

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone">

      <label for="product">Select Product</label>
      <select id="product" name="product" required>
        <option value="">-- Choose an option --</option>
        <option value="signage">Signage</option>
        <option value="banner">Banner</option>
        <option value="vehicle_wrap">Vehicle Wrap</option>
        <option value="merchandise">Branded Merchandise</option>
      </select>

      <label for="size">Size / Dimensions</label>
      <input type="text" id="size" name="size" placeholder="e.g. 2m x 1m">

      <label for="material">Material</label>
      <input type="text" id="material" name="material" placeholder="e.g. Vinyl, Acrylic">

      <label for="file">Upload Logo / Artwork</label>
      <input type="file" id="file" name="file">

      <label for="instructions">Special Instructions(if any)</label>
      <textarea id="instructions" name="instructions" rows="4"></textarea>

      <button type="submit">Submit Order</button>
    </form>
  </div>

  <script>
    document.getElementById('orderForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Thank you! Your order has been submitted. We will contact you shortly.');
      // Here you would normally send the form data to your server
    });
  </script>
</body>
</html>
